server {
    listen 80;
    server_name _;

    root /app;
    index index.php;

    # Definir o prefixo da aplicação
    set $app_prefix "/Pontuacao";

    location ~ ^/Pontuacao/(.*)$ {
        # Bloquear acesso a arquivos sensíveis
        location ~ ^/Pontuacao/(\.|\.env|\.git|\.gitignore|composer\.(json|lock)|package(-lock)?\.json|requirements\.txt|README\.md|bootstrap\.php|.*\.sql)$ {
            return 403;
        }

        # Servir arquivos estáticos existentes
        if (-f $request_filename) {
            access_log off;
            expires 30d;
            break;
        }

        # Servir diretórios existentes
        if (-d $request_filename) {
            break;
        }

        # Reescrever para o controller
        rewrite ^/Pontuacao/(.*)$ /src/controller/controller.php?route=$1 last;
    }

    # Processar PHP
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Negar acesso direto a arquivos sensíveis
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
